services:
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: .
    container_name: server
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - MONGO_URI=mongodb://mongo:27017/userDB
volumes:
  mongo_data: